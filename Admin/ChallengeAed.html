<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./vars.css">
  <link rel="stylesheet" href="./CSS/ChallengeAedstyle.css">
  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }
   </style>
  <title>Document</title>
</head>
<body>
  <div class="challenge-edit-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 sidebar-wrap">
        <div class="sidebar-content">
          <img class="motiv-logo" src="./Images 1/ChallengeAEDmotiv-logo0.png" alt="Motiv logo" />
          <nav class="navigation-bar">
            <a href="ADash.html" class="nav-item-link"><img class="nav-icon" src="./Images 1/ChallengeAEDvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="GroupA.html" class="nav-item-link"><img class="nav-icon" src="./Images 1/ChallengeAEDvector1.svg" alt="" /><span>Groups</span></a>
            <a href="ChallengeA.html" class="nav-item-link active"><img class="nav-icon" src="./Images 1/ChallengeAEDvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="ScheduleA.html" class="nav-item-link"><img class="nav-icon" src="./Images 1/ChallengeAEDvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="PostA.html" class="nav-item-link"><img class="nav-icon" src="./Images 1/ChallengeAEDvector4.svg" alt="" /><span>Posts</span></a>
            <a href="AProfile.html" class="nav-item-link"><img class="nav-icon" src="./Images 1/ChallengeAEDvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <main class="col-12 col-md-9 col-xl-10 main-wrap">
        <header class="topbar">
          <h1 class="page-title">Scheduling</h1>
          <img class="profile-picture" src="./Images 1/ChallengeAEDprofile-picture0.png" alt="Profile picture" />
        </header>

        <section class="edit-card">
          <div class="card-header-line">
            <h2 class="edit-group">Edit Scheduling</h2>
          </div>

          <form class="edit-form">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label-custom" for="groupField">Group</label>
                <input id="groupField" class="form-control custom-input" type="text" value="Group" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label-custom" for="sessionName">Session Name</label>
                <input id="sessionName" class="form-control custom-input" type="text" value="Session Name" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label-custom" for="dateField">Date</label>
                <input id="dateField" class="form-control custom-input" type="text" value="Date" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label-custom" for="timeField">Time</label>
                <input id="timeField" class="form-control custom-input" type="text" value="Time" />
              </div>
              <div class="col-12">
                <label class="form-label-custom" for="locationField">Location</label>
                <input id="locationField" class="form-control custom-input" type="text" value="Location" />
              </div>
            </div>

            <div class="button-row">
              <a href="ChallengeA.html" class="action-btn secondary-btn">Cancel</a>
              <a href="ChallengeA.html" class="action-btn primary-btn">Save</a>
            </div>
          </form>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
