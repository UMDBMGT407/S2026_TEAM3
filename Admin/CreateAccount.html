<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./vars.css" />
    <link rel="stylesheet" href="./CSS/CAstyle.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Create Account</title>
    <style>
      a,
      button,
      input,
      select,
      h1,
      h2,
      h3,
      h4,
      h5,
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border: none;
        text-decoration: none;
        background: none;
        -webkit-font-smoothing: antialiased;
      }
      menu,
      ol,
      ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row min-vh-100">
        <!-- LEFT SIDE COLORS -->
        <div
          class="col-md-6 position-relative overflow-visible d-none d-md-block"
        >
          <img
            src="./Images 1/CAleft-side-colors0.svg"
            class="position-absolute top-50 translate-middle-y"
            style="width: 150%; max-width: none; left: -50%"
            alt="Left colors"
          />
        </div>

        <!-- RIGHT SIDE FORM -->
        <div
          class="col-md-6 d-flex flex-column justify-content-center align-items-center"
        >
          <!-- Logo and Welcome -->
          <div class="text-center mb-4">
            <img
              class="img-fluid mb-3"
              src="./Images 1/CAmotiv-logo0.png"
              style="max-width: 150px"
              alt="Motiv Logo"
            />
            <h2>Welcome to Motiv</h2>
          </div>

         

<div class="w-75">
  <!-- Email -->
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" class="form-control" placeholder="Enter your Email here">
  </div>

  <!-- Password -->
  <div class="mb-3">
    <label class="form-label">Password</label>
    <input type="password" class="form-control" placeholder="Enter your Password here">
  </div>

  <!-- First and Last Name -->
  <div class="row mb-3">
    <div class="col-md-6 mb-2">
      <label class="form-label">First Name</label>
      <input type="text" class="form-control" placeholder="Enter your first name here">
    </div>
    <div class="col-md-6">
      <label class="form-label">Last Name</label>
      <input type="text" class="form-control" placeholder="Enter your last name here">
    </div>
  </div>

  <!-- ✅ ONLY BUTTONS (bottom) -->
  <div class="d-grid mb-3">
<a href="ADash.html" class="btn btn-primary btn-lg">Create Account</a>  </div>

  <div class="text-center">
    <a href="index.html" class="btn btn-outline-primary w-100">
      Already have an account? Log in
    </a>
  </div>
</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
