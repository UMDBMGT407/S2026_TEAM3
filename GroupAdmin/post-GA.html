<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./vars.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/post-GA.css">
  <title>Posts</title>
</head>
<body>
  <div class="pga-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 pga-sidebar">
        <div class="pga-sidebar-inner">
          <img class="pga-logo" src="images/P2GAmotiv-logo1.png" alt="Motiv logo" />
          <nav class="pga-nav" aria-label="Main navigation">
            <a href="GADash.html" class="pga-nav-link"><img class="pga-nav-icon" src="images/P2GAvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="created-groups-GA.html" class="pga-nav-link"><img class="pga-nav-icon" src="images/P2GAvector1.svg" alt="" /><span>Groups</span></a>
            <a href="scheduling-GA.html" class="pga-nav-link"><img class="pga-nav-icon" src="images/P2GAvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="created-challenges-GA.html" class="pga-nav-link"><img class="pga-nav-icon" src="images/P2GAvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="post-GA.html" class="pga-nav-link active"><img class="pga-nav-icon" src="images/P2GAvector4.svg" alt="" /><span>Posts</span></a>
            <a href="workout-history-GA.html" class="pga-nav-link"><img class="pga-nav-icon pga-nav-icon--log" src="images/P2GAvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="profile-GA.html" class="pga-nav-link"><img class="pga-nav-icon pga-nav-icon--profile" src="images/P2GAvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 pga-main d-flex flex-column">
        <header class="pga-topbar">
          <h1 class="pga-page-title">Posts</h1>
          <div class="pga-topbar-actions">
            <a href="notifications-GA.html" class="pga-notify-btn" aria-label="Notifications">
              <span class="pga-notify-bg"></span>
              <img class="pga-notify-icon" src="images/P2GA_002-notification-10.svg" alt="" />
            </a>
            <img class="pga-avatar" src="images/P2GAprofile-picture1.png" alt="Profile picture" />
          </div>
        </header>

        <div class="pga-main-canvas flex-grow-1">
          <div class="d-flex justify-content-end mb-3 pga-grid-head">
            <button class="pga-add-btn" type="button" aria-label="Add post">
              <img src="images/P2GAadd-button0.svg" alt="" />
            </button>
          </div>

          <div class="pga-posts-grid-wrap">
            <div class="row g-4 pga-post-grid">
              <div class="col-12 col-lg-6">
                <article class="pga-post-card">
                  <div class="pga-image-shell"><img src="images/P2GAplaceholder0.png" alt="Post image" /></div>
                  <div class="pga-post-meta"><span>email@gmail.com</span></div>
                </article>
              </div>
              <div class="col-12 col-lg-6">
                <article class="pga-post-card">
                  <div class="pga-image-shell"><img src="images/P2GAplaceholder1.png" alt="Post image" /></div>
                  <div class="pga-post-meta"><span>email@gmail.com</span></div>
                </article>
              </div>
              <div class="col-12 col-lg-6">
                <article class="pga-post-card">
                  <div class="pga-image-shell"><img src="images/P2GAplaceholder2.png" alt="Post image" /></div>
                  <div class="pga-post-meta"><span>email@gmail.com</span></div>
                </article>
              </div>
              <div class="col-12 col-lg-6">
                <article class="pga-post-card">
                  <div class="pga-image-shell"><img src="images/P2GAplaceholder3.png" alt="Post image" /></div>
                  <div class="pga-post-meta">
                    <span>Your Post</span>
                    <button class="pga-delete-btn" type="button" aria-label="Delete post"><img src="images/SGAtrash-can-button0.svg" alt="" /></button>
                  </div>
                </article>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
