<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/vars.css">
  <link rel="stylesheet" href="css/edit-challenge-GA.css">
  <title>Edit Challenge</title>
</head>
<body>
  <div class="ecga-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 ecga-sidebar">
        <div class="ecga-sidebar-inner">
          <img class="ecga-logo" src="images/ECGAmotiv-logo1.png" alt="Motiv logo" />
          <nav class="ecga-nav" aria-label="Main navigation">
            <a href="GADash.html" class="ecga-nav-link"><img class="ecga-nav-icon" src="images/ECGAvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="created-groups-GA.html" class="ecga-nav-link"><img class="ecga-nav-icon" src="images/ECGAvector1.svg" alt="" /><span>Groups</span></a>
            <a href="scheduling-GA.html" class="ecga-nav-link"><img class="ecga-nav-icon" src="images/ECGAvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="created-challenges-GA.html" class="ecga-nav-link active"><img class="ecga-nav-icon" src="images/ECGAvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="post-GA.html" class="ecga-nav-link"><img class="ecga-nav-icon" src="images/ECGAvector4.svg" alt="" /><span>Posts</span></a>
            <a href="workout-history-GA.html" class="ecga-nav-link"><img class="ecga-nav-icon" src="images/ECGAvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="profile-GA.html" class="ecga-nav-link"><img class="ecga-nav-icon" src="images/ECGAvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 ecga-main d-flex flex-column">
        <header class="ecga-topbar">
          <h1 class="ecga-page-title">Challenge</h1>
          <div class="ecga-topbar-actions">
            <a href="notifications-GA.html" class="ecga-notify-btn" aria-label="Notifications">
              <span class="ecga-notify-bg"></span>
              <img class="ecga-notify-icon" src="images/CGGA_002-notification-10.svg" alt="" />
            </a>
            <img class="ecga-avatar" src="images/ECGAprofile-picture1.png" alt="Profile picture" />
          </div>
        </header>

        <main class="ecga-main-canvas flex-grow-1">
          <section class="ecga-card">
            <div class="ecga-card-head">
              <h2 class="ecga-card-title">Edit Challenge</h2>
            </div>

            <form class="ecga-form" action="#" method="post">
              <div class="row g-4">
                <div class="col-12 col-lg-6">
                  <label class="ecga-label" for="ecga-challenge-name">Challenge Name</label>
                  <input id="ecga-challenge-name" class="ecga-input" type="text" value="Challenge Name" />
                </div>
                <div class="col-12 col-lg-6">
                  <label class="ecga-label" for="ecga-goal">Challenge Goal</label>
                  <input id="ecga-goal" class="ecga-input" type="text" value="# Of Workouts" />
                </div>
                <div class="col-12">
                  <label class="ecga-label" for="ecga-group">Group</label>
                  <div class="ecga-select-wrap">
                    <select id="ecga-group" class="ecga-select" aria-label="Group">
                      <option>Group</option>
                    </select>
                    <img class="ecga-select-chevron" src="images/ECGAvector-40.svg" alt="" />
                  </div>
                </div>
                <div class="col-12 col-sm-6 col-lg-4">
                  <label class="ecga-label" for="ecga-start-date">Start Date</label>
                  <input id="ecga-start-date" class="ecga-input" type="text" value="Start Date" />
                </div>
                <div class="col-12 col-sm-6 col-lg-4">
                  <label class="ecga-label" for="ecga-end-date">End Date</label>
                  <input id="ecga-end-date" class="ecga-input" type="text" value="End Date" />
                </div>
              </div>

              <div class="ecga-actions">
                <a href="created-challenges-GA.html" class="ecga-btn ecga-btn--primary">Save</a>
                <a href="created-challenges-GA.html" class="ecga-btn ecga-btn--secondary">Cancel</a>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
