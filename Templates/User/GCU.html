<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../Static/CSS/GCUstyle.css">

  <style>
    a,
    button,
    input,
    select,
    textarea,
    h1,
    h2,
    h3,
    h4,
    h5,
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      border: none;
      text-decoration: none;
      background: none;
      -webkit-font-smoothing: antialiased;
    }

    menu, ol, ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
    }
  </style>
  <title>Group Creation</title>
</head>
<body>
  <div class="gcu-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 gcu-sidebar">
        <div class="gcu-sidebar-inner">
          <img class="gcu-logo" src="../../Static/Images%202/GCUmotiv-logo0.png" alt="Motiv logo" />
          <nav class="gcu-nav" aria-label="Main navigation">
            <a href="UDash.html" class="gcu-nav-link">
              <img class="gcu-nav-icon" src="../../Static/Images%202/GCUvector0.svg" alt="" />
              <span>Dashboard</span>
            </a>
            <a href="GJU.html" class="gcu-nav-link active">
              <img class="gcu-nav-icon" src="../../Static/Images%202/GCUvector1.svg" alt="" />
              <span>Groups</span>
            </a>
            <a href="SU.html" class="gcu-nav-link">
              <img class="gcu-nav-icon" src="../../Static/Images%202/GCUvector2.svg" alt="" />
              <span>Scheduling</span>
            </a>
            <a href="CHU.html" class="gcu-nav-link">
              <img class="gcu-nav-icon" src="../../Static/Images%202/GCUvector3.svg" alt="" />
              <span>Challenges</span>
            </a>
            <a href="PU.html" class="gcu-nav-link">
              <img class="gcu-nav-icon" src="../../Static/Images%202/GCUvector4.svg" alt="" />
              <span>Posts</span>
            </a>
            <a href="WLU.html" class="gcu-nav-link">
              <img class="gcu-nav-icon gcu-nav-icon--log" src="../../Static/Images%202/GCUvector-log0.svg" alt="" />
              <span>Workout Log</span>
            </a>
            <a href="ProU.html" class="gcu-nav-link">
              <img class="gcu-nav-icon gcu-nav-icon--profile" src="../../Static/Images%202/GCUvector-profile-icon0.svg" alt="" />
              <span>Profile</span>
            </a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 gcu-main d-flex flex-column">
        <header class="gcu-topbar">
          <h1 class="gcu-page-title">Group Creation</h1>
          <div class="gcu-topbar-actions">
            <a href="NU.html" class="gcu-notify-btn" aria-label="Notifications">
              <span class="gcu-notify-bg"></span>
              <img class="gcu-notify-icon" src="../../Static/Images%202/GCU_002-notification-10.svg" alt="" />
            </a>
            <img class="gcu-avatar-top" src="../../Static/Images%202/GCUprofile-picture0.png" alt="Profile picture" />
          </div>
        </header>

        <div class="gcu-main-canvas flex-grow-1">
          <div class="row justify-content-center">
            <div class="col-12 col-xl-11 col-xxl-10">
              <div class="gcu-card">
                <div class="gcu-card-header">
                  <h2 class="gcu-card-tab">Create Group</h2>
                </div>

                <div class="row g-4 gcu-card-body g-xl-5">
                  <div class="col-12 col-md-4 col-lg-3">
                    <div class="gcu-avatar-block">
                      <img class="gcu-avatar-large" src="../../Static/Images%202/GCUprofile-picture1.png" alt="Group image" />
                      <button type="button" class="gcu-avatar-edit" aria-label="Edit group image">
                        <span class="gcu-avatar-edit-bg"></span>
                        <img class="gcu-avatar-edit-icon" src="../../Static/Images%202/GCUpencil-alt-10.svg" alt="" />
                      </button>
                    </div>
                  </div>

                  <div class="col-12 col-md-8 col-lg-9">
                    <form class="gcu-form" id="gcu-create-form" action="/actions/user/create-group-become-ga" method="post">
                      <h3 class="h6 mb-3">Create a new group</h3>
                      <p class="small text-muted mb-3">You will become this group&rsquo;s admin and sign in as group admin with the same email and password.</p>
                      <div class="mb-3">
                        <label class="gcu-label" for="gcu-create-name">Group name</label>
                        <input id="gcu-create-name" name="group_name" class="gcu-input" type="text" placeholder="Group name" required />
                      </div>
                      <div class="mb-4">
                        <label class="gcu-label" for="gcu-create-desc">Description</label>
                        <textarea id="gcu-create-desc" name="group_description" class="gcu-input" rows="4" placeholder="Group description"></textarea>
                      </div>
                      <div class="gcu-actions">
                        <button type="submit" class="gcu-btn gcu-btn--primary border-0">Create group</button>
                        <a href="GJU.html" class="gcu-btn gcu-btn--cancel">Cancel</a>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
