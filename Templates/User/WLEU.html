<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/vars.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../Static/CSS/WLEUstyle.css">
  <title>Edit Workout Exercise</title>
</head>
<body>
  <div class="wleu-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 wleu-sidebar">
        <div class="wleu-sidebar-inner">
          <img class="wleu-logo" src="../../Static/Images%202/WLEUmotiv-logo0.png" alt="Motiv logo" />
          <nav class="wleu-nav" aria-label="Main navigation">
            <a href="UDash.html" class="wleu-nav-link"><img class="wleu-nav-icon" src="../../Static/Images%202/WLEUvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="GJU.html" class="wleu-nav-link"><img class="wleu-nav-icon" src="../../Static/Images%202/WLEUvector1.svg" alt="" /><span>Groups</span></a>
            <a href="SU.html" class="wleu-nav-link"><img class="wleu-nav-icon" src="../../Static/Images%202/WLEUvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="CHU.html" class="wleu-nav-link"><img class="wleu-nav-icon" src="../../Static/Images%202/WLEUvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="PU.html" class="wleu-nav-link"><img class="wleu-nav-icon" src="../../Static/Images%202/WLEUvector4.svg" alt="" /><span>Posts</span></a>
            <a href="WLU.html" class="wleu-nav-link active"><img class="wleu-nav-icon" src="../../Static/Images%202/WLEUvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="ProU.html" class="wleu-nav-link"><img class="wleu-nav-icon" src="../../Static/Images%202/WLEUvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 wleu-main d-flex flex-column">
        <header class="wleu-topbar">
          <h1 class="wleu-page-title">Workout Log</h1>
          <div class="wleu-topbar-actions">
            <a href="NU.html" class="wleu-notify-btn" aria-label="Notifications">
              <span class="wleu-notify-bg"></span>
              <img class="wleu-notify-icon" src="../../Static/Images%202/WLEU_002-notification-10.svg" alt="" />
            </a>
            <img class="wleu-avatar" src="../../Static/Images%202/WLEUprofile-picture0.png" alt="Profile picture" />
          </div>
        </header>

        <div class="wleu-main-canvas flex-grow-1">
          <section class="wleu-card">
            <div class="wleu-tabs">
              <span class="wleu-tab active">Workout Details</span>
              <span class="wleu-tab">Performance Metrics</span>
            </div>

            <form class="wleu-form" action="#" method="post">
              <div class="row g-4">
                <div class="col-12 col-xl-6">
                  <label class="wleu-label" for="wleu-date">Date</label>
                  <input id="wleu-date" class="wleu-input" type="text" value="25 January 1990" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wleu-label" for="wleu-sets">Sets</label>
                  <input id="wleu-sets" class="wleu-input" type="text" value="3" />
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wleu-label" for="wleu-exercise">Exercise Name</label>
                  <input id="wleu-exercise" class="wleu-input" type="text" value="Sit-ups" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wleu-label" for="wleu-reps">Reps</label>
                  <input id="wleu-reps" class="wleu-input" type="text" value="10" />
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wleu-label" for="wleu-duration">Duration (minutes)</label>
                  <input id="wleu-duration" class="wleu-input" type="text" value="30" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wleu-label" for="wleu-weight">Weights</label>
                  <input id="wleu-weight" class="wleu-input" type="text" value="5" />
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wleu-label" for="wleu-difficulty">Difficulty Level</label>
                  <input id="wleu-difficulty" class="wleu-input" type="text" value="Medium" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wleu-label" for="wleu-challenge">Add to Challenge (optional)</label>
                  <select id="wleu-challenge" class="wleu-input wleu-select">
                    <option selected>Challenge Name</option>
                  </select>
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wleu-label" for="wleu-muscle">Muscle Group</label>
                  <input id="wleu-muscle" class="wleu-input" type="text" value="Abs" />
                </div>
              </div>

              <div class="wleu-actions">
                <a href="WLDU.html" class="wleu-btn wleu-btn--primary">Save</a>
                <a href="WLDU.html" class="wleu-btn wleu-btn--secondary">Cancel</a>
              </div>
            </form>
          </section>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
