<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../Static/CSS/NUstyle.css">
  <title>Notifications</title>
</head>
<body>
  <div class="nu-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 nu-sidebar">
        <div class="nu-sidebar-inner">
          <img class="nu-logo" src="../../Static/Images%202/NUmotiv-logo0.png" alt="Motiv logo" />
          <nav class="nu-nav" aria-label="Main navigation">
            <a href="UDash.html" class="nu-nav-link"><img class="nu-nav-icon" src="../../Static/Images%202/NUvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="GJU.html" class="nu-nav-link"><img class="nu-nav-icon" src="../../Static/Images%202/NUvector1.svg" alt="" /><span>Groups</span></a>
            <a href="SU.html" class="nu-nav-link"><img class="nu-nav-icon" src="../../Static/Images%202/NUvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="CHU.html" class="nu-nav-link"><img class="nu-nav-icon" src="../../Static/Images%202/NUvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="PU.html" class="nu-nav-link"><img class="nu-nav-icon" src="../../Static/Images%202/NUvector4.svg" alt="" /><span>Posts</span></a>
            <a href="WLU.html" class="nu-nav-link"><img class="nu-nav-icon" src="../../Static/Images%202/NUvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="ProU.html" class="nu-nav-link"><img class="nu-nav-icon" src="../../Static/Images%202/NUvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 nu-main d-flex flex-column">
        <header class="nu-topbar">
          <h1 class="nu-page-title">Notifications</h1>
          <div class="nu-topbar-actions">
            <a href="NU.html" class="nu-notify-btn" aria-label="Notifications">
              <span class="nu-notify-bg"></span>
              <img class="nu-notify-icon" src="../../Static/Images%202/NU_002-notification-10.svg" alt="" />
            </a>
            <img class="nu-avatar" src="../../Static/Images%202/NUprofile-picture0.png" alt="Profile picture" />
          </div>
        </header>

        <main class="nu-main-canvas flex-grow-1">
          <section class="nu-card">
            <div class="nu-head-row">
              <span>Invites</span>
              <span>Actions</span>
            </div>

            <div class="nu-invites">
              <article class="nu-invite-row">
                <p class="nu-invite-label">Group Name 1</p>
                <div class="nu-actions">
                  <button class="nu-action-btn" type="button">Accept</button>
                  <button class="nu-action-btn" type="button">Reject</button>
                </div>
              </article>

              <article class="nu-invite-row">
                <p class="nu-invite-label">Group 1 : Challenge Name</p>
                <div class="nu-actions">
                  <button class="nu-action-btn" type="button">Accept</button>
                  <button class="nu-action-btn" type="button">Reject</button>
                </div>
              </article>

              <article class="nu-invite-row">
                <p class="nu-invite-label">Group Name 2</p>
                <div class="nu-actions">
                  <button class="nu-action-btn" type="button">Accept</button>
                  <button class="nu-action-btn" type="button">Reject</button>
                </div>
              </article>

              <article class="nu-invite-row">
                <p class="nu-invite-label">Group Name : Challenge Name</p>
                <div class="nu-actions">
                  <button class="nu-action-btn" type="button">Accept</button>
                  <button class="nu-action-btn" type="button">Reject</button>
                </div>
              </article>

              <article class="nu-invite-row">
                <p class="nu-invite-label">Group Name 5</p>
                <div class="nu-actions">
                  <button class="nu-action-btn" type="button">Accept</button>
                  <button class="nu-action-btn" type="button">Reject</button>
                </div>
              </article>
            </div>
          </section>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
