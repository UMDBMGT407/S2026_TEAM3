<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/vars.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../Static/CSS/WLAUstyle.css">
  <title>Add Workout Exercise</title>
</head>
<body>
  <div class="wlau-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 wlau-sidebar">
        <div class="wlau-sidebar-inner">
          <img class="wlau-logo" src="../../Static/Images%202/WLAUmotiv-logo0.png" alt="Motiv logo" />
          <nav class="wlau-nav" aria-label="Main navigation">
            <a href="UDash.html" class="wlau-nav-link"><img class="wlau-nav-icon" src="../../Static/Images%202/WLAUvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="GJU.html" class="wlau-nav-link"><img class="wlau-nav-icon" src="../../Static/Images%202/WLAUvector1.svg" alt="" /><span>Groups</span></a>
            <a href="SU.html" class="wlau-nav-link"><img class="wlau-nav-icon" src="../../Static/Images%202/WLAUvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="CHU.html" class="wlau-nav-link"><img class="wlau-nav-icon" src="../../Static/Images%202/WLAUvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="PU.html" class="wlau-nav-link"><img class="wlau-nav-icon" src="../../Static/Images%202/WLAUvector4.svg" alt="" /><span>Posts</span></a>
            <a href="WLU.html" class="wlau-nav-link active"><img class="wlau-nav-icon" src="../../Static/Images%202/WLAUvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="ProU.html" class="wlau-nav-link"><img class="wlau-nav-icon" src="../../Static/Images%202/WLAUvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 wlau-main d-flex flex-column">
        <header class="wlau-topbar">
          <h1 class="wlau-page-title">Workout Log</h1>
          <div class="wlau-topbar-actions">
            <a href="NU.html" class="wlau-notify-btn" aria-label="Notifications">
              <span class="wlau-notify-bg"></span>
              <img class="wlau-notify-icon" src="../../Static/Images%202/WLAU_002-notification-10.svg" alt="" />
            </a>
            <img class="wlau-avatar" src="../../Static/Images%202/WLAUprofile-picture0.png" alt="Profile picture" />
          </div>
        </header>

        <div class="wlau-main-canvas flex-grow-1">
          <section class="wlau-card">
            <div class="wlau-tabs">
              <span class="wlau-tab active">Workout Details</span>
              <span class="wlau-tab">Performance Metrics</span>
            </div>

            <form class="wlau-form" action="#" method="post">
              <div class="row g-4">
                <div class="col-12 col-xl-6">
                  <label class="wlau-label" for="wlau-date">Date</label>
                  <input id="wlau-date" class="wlau-input" type="text" value="25 January 1990" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wlau-label" for="wlau-sets">Sets</label>
                  <input id="wlau-sets" class="wlau-input" type="text" value="3" />
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wlau-label" for="wlau-exercise">Exercise Name</label>
                  <input id="wlau-exercise" class="wlau-input" type="text" value="Sit-ups" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wlau-label" for="wlau-reps">Reps</label>
                  <input id="wlau-reps" class="wlau-input" type="text" value="10" />
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wlau-label" for="wlau-duration">Duration (minutes)</label>
                  <input id="wlau-duration" class="wlau-input" type="text" value="30" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wlau-label" for="wlau-weight">Weights</label>
                  <input id="wlau-weight" class="wlau-input" type="text" value="5" />
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wlau-label" for="wlau-difficulty">Difficulty Level</label>
                  <input id="wlau-difficulty" class="wlau-input" type="text" value="Medium" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wlau-label" for="wlau-challenge">Add to Challenge (optional)</label>
                  <select id="wlau-challenge" class="wlau-input wlau-select">
                    <option selected>Challenge Name</option>
                  </select>
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wlau-label" for="wlau-muscle">Muscle Group</label>
                  <input id="wlau-muscle" class="wlau-input" type="text" value="Abs" />
                </div>
              </div>

              <div class="wlau-actions">
                <a href="WLDU.html" class="wlau-btn wlau-btn--primary">Log</a>
                <a href="WLDU.html" class="wlau-btn wlau-btn--secondary">Cancel</a>
              </div>
            </form>
          </section>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
