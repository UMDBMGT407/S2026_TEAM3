<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../Static/CSS/PUstyle.css">
  <title>Posts</title>
</head>
<body>
  <div class="pu-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 pu-sidebar">
        <div class="pu-sidebar-inner">
          <img class="pu-logo" src="../../Static/Images%202/PUmotiv-logo0.png" alt="Motiv logo" />
          <nav class="pu-nav" aria-label="Main navigation">
            <a href="UDash.html" class="pu-nav-link"><img class="pu-nav-icon" src="../../Static/Images%202/PUvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="GJU.html" class="pu-nav-link"><img class="pu-nav-icon" src="../../Static/Images%202/PUvector1.svg" alt="" /><span>Groups</span></a>
            <a href="SU.html" class="pu-nav-link"><img class="pu-nav-icon" src="../../Static/Images%202/PUvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="CHU.html" class="pu-nav-link"><img class="pu-nav-icon" src="../../Static/Images%202/PUvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="PU.html" class="pu-nav-link active"><img class="pu-nav-icon" src="../../Static/Images%202/PUvector4.svg" alt="" /><span>Posts</span></a>
            <a href="WLU.html" class="pu-nav-link"><img class="pu-nav-icon pu-nav-icon--log" src="../../Static/Images%202/PUvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="ProU.html" class="pu-nav-link"><img class="pu-nav-icon pu-nav-icon--profile" src="../../Static/Images%202/PUvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 pu-main d-flex flex-column">
        <header class="pu-topbar">
          <h1 class="pu-page-title">Posts</h1>
          <div class="pu-topbar-actions">
            <a href="NU.html" class="pu-notify-btn" aria-label="Notifications">
              <span class="pu-notify-bg"></span>
              <img class="pu-notify-icon" src="../../Static/Images%202/PU_002-notification-10.svg" alt="" />
            </a>
            <img class="pu-avatar" src="../../Static/Images%202/PUprofile-picture0.png" alt="Profile picture" />
          </div>
        </header>

        <div class="pu-main-canvas flex-grow-1">
          <div class="d-flex justify-content-end mb-3 pu-grid-head">
            <button id="pu-add-btn" class="pu-add-btn" type="button" aria-label="Add post">
              <img src="../../Static/Images%202/PUadd-button0.svg" alt="" />
            </button>
          </div>
          <div id="pu-compose-panel" class="pu-compose-panel d-none">
            <label class="pu-compose-label" for="pu-post-content">Post text</label>
            <textarea id="pu-post-content" class="pu-compose-text" rows="3" placeholder="Write your post..."></textarea>
            <label class="pu-compose-label" for="pu-post-photo">Photo (optional)</label>
            <input id="pu-post-photo" class="pu-compose-file" type="file" accept="image/*" />
            <div class="pu-compose-actions">
              <button id="pu-submit-post" class="pu-compose-submit" type="button">Post</button>
              <button id="pu-cancel-post" class="pu-compose-cancel" type="button">Cancel</button>
            </div>
          </div>

          <div class="pu-posts-grid-wrap">
          <div class="row g-4 pu-post-grid">
            {% for p in posts %}
            <div class="col-12 col-lg-6">
              <article class="pu-post-card">
                <div class="pu-image-shell">
                  <img src="{{ p.post_photo_path or ('../../Static/Images%202/PUplaceholder' ~ (loop.index0 % 4) ~ '.png') }}" alt="Post image" />
                </div>
                <div class="pu-post-meta d-flex justify-content-between align-items-center">
                  <span>{{ p.user_email }}</span>
                  {% if session_role == 'user' and session_id == p.user_id %}
                  <button class="pu-delete-btn" type="button" aria-label="Delete post" onclick="deletePost({{ p.post_id }})"><img src="../../Static/Images%202/PUtrash-can-button0.svg" alt="" /></button>
                  {% endif %}
                </div>
                <p class="px-2 small text-muted">{{ p.post_content }}</p>
              </article>
            </div>
            {% else %}
            <p class="text-muted">No posts yet. Add one with the + button (log in as a user).</p>
            {% endfor %}
          </div>
          </div>
        </div>
        <script>
        var puAddBtn = document.getElementById('pu-add-btn');
        var puCompose = document.getElementById('pu-compose-panel');
        var puCancel = document.getElementById('pu-cancel-post');
        var puSubmit = document.getElementById('pu-submit-post');
        var puContent = document.getElementById('pu-post-content');
        var puPhoto = document.getElementById('pu-post-photo');

        puAddBtn.addEventListener('click', function () {
          puCompose.classList.toggle('d-none');
          if (!puCompose.classList.contains('d-none')) puContent.focus();
        });

        puCancel.addEventListener('click', function () {
          puCompose.classList.add('d-none');
          puContent.value = '';
          puPhoto.value = '';
        });

        puSubmit.addEventListener('click', async function () {
          var content = (puContent.value || '').trim();
          var file = puPhoto.files && puPhoto.files[0] ? puPhoto.files[0] : null;
          if (!content && !file) {
            alert('Add text or choose a photo.');
            return;
          }
          var fd = new FormData();
          if (content) fd.append('post_content', content);
          if (file) fd.append('photo', file);
          var r = await fetch('/api/posts', { method: 'POST', credentials: 'same-origin', body: fd });
          if (r.status === 401) { alert('Log in as a user (e.g. john@motiv.test) to post.'); return; }
          if (r.ok) {
            location.reload();
            return;
          }
          var msg = 'Could not save post.';
          try {
            var j = await r.json();
            if (j && j.error) msg = j.error;
          } catch (_e) {}
          alert(msg);
        });
        async function deletePost(id) {
          var r = await fetch('/api/posts/' + id, { method: 'DELETE', credentials: 'same-origin' });
          if (r.ok) location.reload(); else alert('Could not delete.');
        }
        </script>
      </div>
    </div>
  </div>
</body>
</html>
