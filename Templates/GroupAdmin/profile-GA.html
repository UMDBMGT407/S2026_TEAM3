<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../Static/CSS/profile-GA.css">
  <title>Profile</title>
</head>
<body>
  <div class="pga-profile-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 pga-profile-sidebar">
        <div class="pga-profile-sidebar-inner">
          <img class="pga-profile-logo" src="../../Static/images/PGAmotiv-logo-profile0.png" alt="Motiv logo" />

          <nav class="pga-profile-nav" aria-label="Main navigation">
            <a href="GADash.html" class="pga-profile-nav-link"><img class="pga-profile-nav-icon" src="../../Static/images/PGAvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="created-groups-GA.html" class="pga-profile-nav-link"><img class="pga-profile-nav-icon" src="../../Static/images/PGAvector1.svg" alt="" /><span>Groups</span></a>
            <a href="scheduling-GA.html" class="pga-profile-nav-link"><img class="pga-profile-nav-icon" src="../../Static/images/PGAvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="created-challenges-GA.html" class="pga-profile-nav-link"><img class="pga-profile-nav-icon" src="../../Static/images/PGAvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="post-GA.html" class="pga-profile-nav-link"><img class="pga-profile-nav-icon" src="../../Static/images/PGAvector4.svg" alt="" /><span>Posts</span></a>
            <a href="workout-history-GA.html" class="pga-profile-nav-link"><img class="pga-profile-nav-icon" src="../../Static/images/PGAvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="profile-GA.html" class="pga-profile-nav-link active"><img class="pga-profile-nav-icon" src="../../Static/images/PGAvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 pga-profile-main d-flex flex-column">
        <header class="pga-profile-topbar">
          <h1 class="pga-profile-page-title">Profile</h1>
          <div class="pga-profile-topbar-actions">
            <a href="notifications-GA.html" class="pga-profile-notify-btn" aria-label="Notifications">
              <span class="pga-profile-notify-bg"></span>
              <img class="pga-profile-notify-icon" src="../../Static/images/PGA_002-notification-10.svg" alt="" />
            </a>
            <img class="pga-profile-avatar" src="../../Static/images/PGAprofile-picture-profile0.png" alt="Profile picture" />
          </div>
        </header>

        <main class="pga-profile-main-canvas flex-grow-1">
          <section class="pga-profile-card">
            <div class="pga-profile-tabs">
              <span class="pga-profile-tab active">Edit Profile</span>
            </div>

            <form class="pga-profile-form" action="#" method="post">
              <div class="row g-4 align-items-start">
                <div class="col-12 col-xl-auto">
                  <div class="pga-profile-photo-wrap">
                    <img class="pga-profile-photo" src="../../Static/images/PGAprofile-image-10.png" alt="Profile" />
                    <button class="pga-profile-photo-edit-btn" type="button" aria-label="Edit profile photo">
                      <img src="../../Static/images/PGApencil-alt-10.svg" alt="" />
                    </button>
                  </div>
                </div>

                <div class="col-12 col-xl">
                  <div class="row g-4">
                    <div class="col-12 col-lg-6">
                      <label class="pga-profile-label" for="pga-profile-first-name">First Name</label>
                      <input id="pga-profile-first-name" class="pga-profile-input" type="text" value="John" />
                    </div>
                    <div class="col-12 col-lg-6">
                      <label class="pga-profile-label" for="pga-profile-last-name">Last Name</label>
                      <input id="pga-profile-last-name" class="pga-profile-input" type="text" value="Doe" />
                    </div>
                    <div class="col-12 col-lg-6">
                      <label class="pga-profile-label" for="pga-profile-email">Email</label>
                      <input id="pga-profile-email" class="pga-profile-input" type="email" value="johndoe@gmail.com" />
                    </div>
                    <div class="col-12 col-lg-6">
                      <label class="pga-profile-label" for="pga-profile-password">Password</label>
                      <input id="pga-profile-password" class="pga-profile-input" type="password" value="**********" />
                    </div>
                  </div>
                </div>
              </div>

              <div class="pga-profile-actions">
                <button class="pga-profile-btn pga-profile-btn--primary" type="submit">Save</button>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
