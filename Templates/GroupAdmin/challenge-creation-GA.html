<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link rel="stylesheet" href="../../Static/CSS/challenge-creation-GA.css">
  <title>Challenge Creation</title>
</head>
<body>
  <div class="cc2ga-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 cc2ga-sidebar">
        <div class="cc2ga-sidebar-inner">
          <img class="cc2ga-logo" src="../../Static/images/CC2GAmotiv-logo1.png" alt="Motiv logo" />
          <nav class="cc2ga-nav" aria-label="Main navigation">
            <a href="GADash.html" class="cc2ga-nav-link"><img class="cc2ga-nav-icon" src="../../Static/images/CC2GAvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="created-groups-GA.html" class="cc2ga-nav-link"><img class="cc2ga-nav-icon" src="../../Static/images/CC2GAvector1.svg" alt="" /><span>Groups</span></a>
            <a href="scheduling-GA.html" class="cc2ga-nav-link"><img class="cc2ga-nav-icon" src="../../Static/images/CC2GAvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="created-challenges-GA.html" class="cc2ga-nav-link active"><img class="cc2ga-nav-icon" src="../../Static/images/CC2GAvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="post-GA.html" class="cc2ga-nav-link"><img class="cc2ga-nav-icon" src="../../Static/images/CC2GAvector4.svg" alt="" /><span>Posts</span></a>
            <a href="workout-history-GA.html" class="cc2ga-nav-link"><img class="cc2ga-nav-icon" src="../../Static/images/CC2GAvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="profile-GA.html" class="cc2ga-nav-link"><img class="cc2ga-nav-icon" src="../../Static/images/CC2GAvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 cc2ga-main d-flex flex-column">
        <header class="cc2ga-topbar">
          <h1 class="cc2ga-page-title">Challenge</h1>
          <div class="cc2ga-topbar-actions">
            <a href="notifications-GA.html" class="cc2ga-notify-btn" aria-label="Notifications">
              <span class="cc2ga-notify-bg"></span>
              <img class="cc2ga-notify-icon" src="../../Static/images/CGGA_002-notification-10.svg" alt="" />
            </a>
            <img class="cc2ga-avatar" src="../../Static/images/CC2GAprofile-picture1.png" alt="Profile picture" />
          </div>
        </header>

        <main class="cc2ga-main-canvas flex-grow-1">
          <section class="cc2ga-card">
            <div class="cc2ga-card-head">
              <h2 class="cc2ga-card-title">Challenge Creation</h2>
            </div>

            <form class="cc2ga-form" action="/actions/group-admin/challenge" method="post">
              <div class="row g-4">
                <div class="col-12 col-lg-6">
                  <label class="cc2ga-label" for="cc2ga-challenge-name">Challenge Name</label>
                  <input id="cc2ga-challenge-name" name="challenge_title" class="cc2ga-input" type="text" placeholder="Challenge title" required />
                </div>
                <div class="col-12 col-lg-6">
                  <label class="cc2ga-label" for="cc2ga-goal">Challenge Goal</label>
                  <input id="cc2ga-goal" name="challenge_goal" class="cc2ga-input" type="text" placeholder="# of workouts, miles, etc." />
                </div>
                <div class="col-12">
                  <label class="cc2ga-label" for="cc2ga-group">Group</label>
                  <div class="cc2ga-select-wrap">
                    <select id="cc2ga-group" name="group_id" class="cc2ga-select" aria-label="Group" required>
                      {% for g in groups %}
                      <option value="{{ g.group_id }}">{{ g.group_name }}</option>
                      {% endfor %}
                    </select>
                    <img class="cc2ga-select-chevron" src="../../Static/images/CC2GAvector-40.svg" alt="" />
                  </div>
                </div>
                <div class="col-12 col-sm-6 col-lg-4">
                  <label class="cc2ga-label" for="cc2ga-start-date">Start Date</label>
                  <input id="cc2ga-start-date" name="start_date" class="cc2ga-input" type="date" />
                </div>
                <div class="col-12 col-sm-6 col-lg-4">
                  <label class="cc2ga-label" for="cc2ga-end-date">End Date</label>
                  <input id="cc2ga-end-date" name="end_date" class="cc2ga-input" type="date" />
                </div>
              </div>

              <div class="cc2ga-actions">
                <button type="submit" class="cc2ga-btn cc2ga-btn--primary border-0">Create</button>
                <a href="created-challenges-GA.html" class="cc2ga-btn cc2ga-btn--secondary">Cancel</a>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
