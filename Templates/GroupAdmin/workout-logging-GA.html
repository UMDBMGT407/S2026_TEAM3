<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../Static/CSS/workout-logging-GA.css">
  <title>Add Workout Exercise</title>
</head>
<body>
  <div class="wlga-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 wlga-sidebar">
        <div class="wlga-sidebar-inner">
          <img class="wlga-logo" src="../../Static/images/WLGAmotiv-logo0.png" alt="Motiv logo" />
          <nav class="wlga-nav" aria-label="Main navigation">
            <a href="GADash.html" class="wlga-nav-link"><img class="wlga-nav-icon" src="../../Static/images/WLGAvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="created-groups-GA.html" class="wlga-nav-link"><img class="wlga-nav-icon" src="../../Static/images/WLGAvector1.svg" alt="" /><span>Groups</span></a>
            <a href="scheduling-GA.html" class="wlga-nav-link"><img class="wlga-nav-icon" src="../../Static/images/WLGAvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="created-challenges-GA.html" class="wlga-nav-link"><img class="wlga-nav-icon" src="../../Static/images/WLGAvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="post-GA.html" class="wlga-nav-link"><img class="wlga-nav-icon" src="../../Static/images/WLGAvector4.svg" alt="" /><span>Posts</span></a>
            <a href="workout-history-GA.html" class="wlga-nav-link active"><img class="wlga-nav-icon" src="../../Static/images/WLGAvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="profile-GA.html" class="wlga-nav-link"><img class="wlga-nav-icon" src="../../Static/images/WLGAvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 wlga-main d-flex flex-column">
        <header class="wlga-topbar">
          <h1 class="wlga-page-title">Workout Log</h1>
          <div class="wlga-topbar-actions">
            <a href="notifications-GA.html" class="wlga-notify-btn" aria-label="Notifications">
              <span class="wlga-notify-bg"></span>
              <img class="wlga-notify-icon" src="../../Static/images/WLGA_002-notification-10.svg" alt="" />
            </a>
            <img class="wlga-avatar" src="../../Static/images/WLGAprofile-picture1.png" alt="Profile picture" />
          </div>
        </header>

        <div class="wlga-main-canvas flex-grow-1">
          <section class="wlga-card">
            <div class="wlga-tabs">
              <span class="wlga-tab active">Workout Details</span>
              <span class="wlga-tab">Performance Metrics</span>
            </div>

            <form class="wlga-form" action="#" method="post">
              <div class="row g-4">
                <div class="col-12 col-xl-6">
                  <label class="wlga-label" for="wlga-date">Date</label>
                  <input id="wlga-date" class="wlga-input" type="text" value="25 January 1990" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wlga-label" for="wlga-sets">Sets</label>
                  <input id="wlga-sets" class="wlga-input" type="text" value="3" />
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wlga-label" for="wlga-exercise">Exercise Name</label>
                  <input id="wlga-exercise" class="wlga-input" type="text" value="Sit-ups" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wlga-label" for="wlga-reps">Reps</label>
                  <input id="wlga-reps" class="wlga-input" type="text" value="10" />
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wlga-label" for="wlga-duration">Duration (minutes)</label>
                  <input id="wlga-duration" class="wlga-input" type="text" value="30" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wlga-label" for="wlga-weight">Weights</label>
                  <input id="wlga-weight" class="wlga-input" type="text" value="5" />
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wlga-label" for="wlga-difficulty">Difficulty Level</label>
                  <input id="wlga-difficulty" class="wlga-input" type="text" value="Medium" />
                </div>
                <div class="col-12 col-xl-6">
                  <label class="wlga-label" for="wlga-challenge">Add to Challenge (optional)</label>
                  <select id="wlga-challenge" class="wlga-input wlga-select">
                    <option selected>Challenge Name</option>
                  </select>
                </div>

                <div class="col-12 col-xl-6">
                  <label class="wlga-label" for="wlga-muscle">Muscle Group</label>
                  <input id="wlga-muscle" class="wlga-input" type="text" value="Abs" />
                </div>
              </div>

              <div class="wlga-actions">
                <a href="workout-details-GA.html" class="wlga-btn wlga-btn--primary">Log</a>
                <a href="workout-details-GA.html" class="wlga-btn wlga-btn--secondary">Cancel</a>
              </div>
            </form>
          </section>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
