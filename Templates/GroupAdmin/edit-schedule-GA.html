<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link rel="stylesheet" href="../../Static/CSS/edit-schedule-GA.css">
  <title>Edit Schedule</title>
</head>
<body>
  <div class="esga-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 esga-sidebar">
        <div class="esga-sidebar-inner">
          <img class="esga-logo" src="../../Static/images/ESGAmotiv-logo1.png" alt="Motiv logo" />
          <nav class="esga-nav" aria-label="Main navigation">
            <a href="GADash.html" class="esga-nav-link"><img class="esga-nav-icon" src="../../Static/images/ESGAvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="created-groups-GA.html" class="esga-nav-link"><img class="esga-nav-icon" src="../../Static/images/ESGAvector1.svg" alt="" /><span>Groups</span></a>
            <a href="scheduling-GA.html" class="esga-nav-link active"><img class="esga-nav-icon" src="../../Static/images/ESGAvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="created-challenges-GA.html" class="esga-nav-link"><img class="esga-nav-icon" src="../../Static/images/ESGAvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="post-GA.html" class="esga-nav-link"><img class="esga-nav-icon" src="../../Static/images/ESGAvector4.svg" alt="" /><span>Posts</span></a>
            <a href="workout-history-GA.html" class="esga-nav-link"><img class="esga-nav-icon" src="../../Static/images/ESGAvector-log0.svg" alt="" /><span>Workout Log</span></a>
            <a href="profile-GA.html" class="esga-nav-link"><img class="esga-nav-icon" src="../../Static/images/ESGAvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <div class="col-12 col-md-9 col-xl-10 esga-main d-flex flex-column">
        <header class="esga-topbar">
          <h1 class="esga-page-title">Scheduling</h1>
          <div class="esga-topbar-actions">
            <a href="notifications-GA.html" class="esga-notify-btn" aria-label="Notifications">
              <span class="esga-notify-bg"></span>
              <img class="esga-notify-icon" src="../../Static/images/CGGA_002-notification-10.svg" alt="" />
            </a>
            <img class="esga-avatar" src="../../Static/images/ESGAprofile-picture1.png" alt="Profile picture" />
          </div>
        </header>

        <main class="esga-main-canvas flex-grow-1">
          <section class="esga-card">
            <div class="esga-card-head">
              <h2 class="esga-card-title">Edit Scheduling</h2>
            </div>

            <form class="esga-form" action="#" method="post">
              <div class="row g-4">
                <div class="col-12 col-lg-6">
                  <label class="esga-label" for="esga-session-name">Session Name</label>
                  <input id="esga-session-name" class="esga-input" type="text" value="Workout Name" />
                </div>
                <div class="col-12 col-lg-6">
                  <label class="esga-label" for="esga-location">Location</label>
                  <input id="esga-location" class="esga-input" type="text" value="Location" />
                </div>
                <div class="col-12">
                  <label class="esga-label" for="esga-group">Group</label>
                  <div class="esga-select-wrap">
                    <select id="esga-group" class="esga-select" aria-label="Group">
                      <option>Group</option>
                    </select>
                    <img class="esga-select-chevron" src="../../Static/images/ESGAvector-40.svg" alt="" />
                  </div>
                </div>
                <div class="col-12 col-sm-6 col-lg-4">
                  <label class="esga-label" for="esga-date">Date</label>
                  <input id="esga-date" class="esga-input" type="text" value="Date" />
                </div>
                <div class="col-12 col-sm-6 col-lg-4">
                  <label class="esga-label" for="esga-time">Time</label>
                  <input id="esga-time" class="esga-input" type="text" value="Time" />
                </div>
              </div>

              <div class="esga-actions">
                <a href="scheduling-GA.html" class="esga-btn esga-btn--primary">Save</a>
                <a href="scheduling-GA.html" class="esga-btn esga-btn--secondary">Cancel</a>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
