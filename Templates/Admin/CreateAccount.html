<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../Static/CSS/vars.css" />
    <link rel="stylesheet" href="../../Static/CSS/CAstyle.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Create Account</title>
    <style>
      a,
      button,
      input,
      select,
      h1,
      h2,
      h3,
      h4,
      h5,
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border: none;
        text-decoration: none;
        background: none;
        -webkit-font-smoothing: antialiased;
      }
      menu,
      ol,
      ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row min-vh-100">
        <!-- LEFT SIDE COLORS -->
        <div
          class="col-md-6 position-relative overflow-visible d-none d-md-block"
        >
          <img
            src="../../Static/Images%201/CAleft-side-colors0.svg"
            class="position-absolute top-50 translate-middle-y"
            style="width: 150%; max-width: none; left: -50%"
            alt="Left colors"
          />
        </div>

        <!-- RIGHT SIDE FORM -->
        <div
          class="col-md-6 d-flex flex-column justify-content-center align-items-center"
        >
          <!-- Logo and Welcome -->
          <div class="text-center mb-4">
            <img
              class="img-fluid mb-3"
              src="../../Static/Images%201/CAmotiv-logo0.png"
              style="max-width: 150px"
              alt="Motiv Logo"
            />
            <h2>Welcome to Motiv</h2>
          </div>

         

<form class="w-75" method="post" action="/auth/register">
  <div class="mb-3">
    <label class="form-label" for="reg-email">Email</label>
    <input id="reg-email" name="email" type="email" class="form-control" placeholder="Enter your Email here" required>
  </div>

  <div class="mb-3">
    <label class="form-label" for="reg-password">Password</label>
    <input id="reg-password" name="password" type="password" class="form-control" placeholder="Enter your Password here" required>
  </div>

  <div class="row mb-3">
    <div class="col-md-6 mb-2">
      <label class="form-label" for="reg-first">First Name</label>
      <input id="reg-first" name="first_name" type="text" class="form-control" placeholder="Enter your first name here" required>
    </div>
    <div class="col-md-6">
      <label class="form-label" for="reg-last">Last Name</label>
      <input id="reg-last" name="last_name" type="text" class="form-control" placeholder="Enter your last name here" required>
    </div>
  </div>

  <button type="submit" class="btn auth-create-account-btn d-block mx-auto mb-3"><span class="create-account-btn-label">Create Account</span></button>

  <div class="text-center auth-login-footer">
    <span class="auth-login-footer-muted">Already have an account? </span>
    <a href="index.html" class="auth-login-footer-link">Log in</a>
  </div>
</form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
