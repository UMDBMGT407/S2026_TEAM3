<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../Static/CSS/vars.css" />
    <link rel="stylesheet" href="../../Static/CSS/indexstyle.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      a,
      button,
      input,
      select,
      h1,
      h2,
      h3,
      h4,
      h5,
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border: none;
        text-decoration: none;
        background: none;

        -webkit-font-smoothing: antialiased;
      }

      menu,
      ol,
      ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row min-vh-100">
        <!-- LEFT SIDE -->
        <div class="col-md-6 position-relative overflow-visible">
          <img
            src="../../Static/Images%201/Loginleft-side-colors0.svg"
            class="position-absolute top-50 translate-middle-y"
            style="width: 150%; max-width: none; left: -50%"
          />
        </div>

        <!-- RIGHT SIDE -->
        <div
          class="col-md-6 d-flex flex-column justify-content-center align-items-center"
        >
          <!-- Logo + Welcome -->
          <div class="text-center mb-4">
            <img
              class="img-fluid mb-3"
              src="../../Static/Images%201/Loginmotiv-logo0.png"
              style="max-width: 150px"
            />
            <h2>Welcome to Motiv</h2>
          </div>

          {% if login_error %}
          <div
            class="alert alert-danger w-75 mb-3"
            role="alert"
          >
            Incorrect login. Please check your email and password and try again.
          </div>
          {% endif %}

          <form class="w-75" method="post" action="/auth/login">
            {% if login_next %}
            <input type="hidden" name="next" value="{{ login_next }}" />
            {% endif %}
            <div class="mb-3">
              <label class="form-label" for="login-email">Email</label>
              <input
                id="login-email"
                name="email"
                type="email"
                class="form-control"
                placeholder="Enter your Email here"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label" for="login-password">Password</label>
              <input
                id="login-password"
                name="password"
                type="password"
                class="form-control"
                placeholder="Enter your Password here"
                required
              />
            </div>

            <button type="submit" class="btn auth-login-btn d-block mx-auto mb-3"><span class="login-btn-label">Login</span></button>
            <div class="text-center">
              <span>Don’t have an account? </span>
              <a href="CreateAccount.html" class="fw-bold">Create Account Now</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
