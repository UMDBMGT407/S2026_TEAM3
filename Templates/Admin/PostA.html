<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link rel="stylesheet" href="../../Static/CSS/PostAstyle.css">
  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }
   </style>
  <title>Document</title>
</head>
<body>
  <div class="post-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 sidebar-wrap">
        <div class="sidebar-content">
          <img class="motiv-logo" src="../../Static/Images%201/PostAmotiv-logo0.png" alt="Motiv logo" />
          <nav class="navigation-bar">
            <a href="ADash.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/ChallengeAEDvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="GroupA.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/PostAvector1.svg" alt="" /><span>Groups</span></a>
            <a href="ChallengeA.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/PostAvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="ScheduleA.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/ChallengeAEDvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="PostA.html" class="nav-item-link active"><img class="nav-icon" src="../../Static/Images%201/ChallengeAEDvector4.svg" alt="" /><span>Posts</span></a>
            <a href="AProfile.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/PostAvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <main class="col-12 col-md-9 col-xl-10 main-wrap">
        <header class="topbar">
          <h1 class="page-title">Posts</h1>
          <img class="profile-picture" src="../../Static/Images%201/PostAprofile-picture0.png" alt="Profile picture" />
        </header>

        <div class="posts-grid-wrap">
          <div class="row g-4">
            {% for p in posts %}
            <div class="col-12 col-md-6">
              <article class="post-card">
                <div class="post-image-shell">
                  <img src="{{ p.post_photo_path or ('../../Static/Images%201/PostAplaceholder' ~ (loop.index0 % 4) ~ '.png') }}" alt="Post image" />
                </div>
                <div class="post-meta d-flex justify-content-between align-items-center flex-wrap gap-2">
                  <span class="post-email">{{ p.user_email }}</span>
                  <button type="button" class="post-delete-btn" aria-label="Delete post" onclick="adminDeletePost({{ p.post_id }})">
                    <img src="../../Static/Images%201/PostAtrash-can-button3.svg" alt="" />
                  </button>
                </div>
                <p class="small px-2 text-muted">{{ p.post_content }}</p>
              </article>
            </div>
            {% else %}
            <p class="text-muted">No posts in the database.</p>
            {% endfor %}
          </div>
        </div>
        <script>
        async function adminDeletePost(id) {
          if (!confirm('Delete this post?')) return;
          var r = await fetch('/api/posts/' + id, { method: 'DELETE', credentials: 'same-origin' });
          if (r.ok) location.reload(); else alert('Delete failed (log in as admin).');
        }
        </script>
      </main>
    </div>
  </div>
</body>
</html>
