<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link rel="stylesheet" href="../../Static/CSS/GroupAedstyle.css">
  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }
   </style>
  <title>Document</title>
</head>
<body>
  <div class="group-edit-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 sidebar-wrap">
        <div class="sidebar-content">
          <img class="motiv-logo" src="../../Static/Images%201/GroupAedmotiv-logo0.png" alt="Motiv logo" />
          <nav class="navigation-bar">
            <a href="ADash.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/GroupAedvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="GroupA.html" class="nav-item-link active"><img class="nav-icon" src="../../Static/Images%201/GroupAedvector1.svg" alt="" /><span>Groups</span></a>
            <a href="ChallengeA.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/ScheduleAvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="ScheduleA.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/ScheduleAvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="PostA.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/GroupAedvector4.svg" alt="" /><span>Posts</span></a>
            <a href="AProfile.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/GroupAedvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <main class="col-12 col-md-9 col-xl-10 main-wrap">
        <header class="topbar">
          <h1 class="page-title">Groups</h1>
          <img class="profile-picture" src="../../Static/Images%201/GroupAedprofile-picture0.png" alt="Profile picture" />
        </header>

        <section class="edit-card">
          <div class="card-header-line">
            <h2 class="edit-group">Edit Group</h2>
          </div>

          {% if edit_group %}
          <form class="edit-form" method="post" action="/actions/admin/group/{{ edit_group.group_id }}/edit">
            <div>
              <label class="form-label-custom" for="groupName">Group Name</label>
              <input id="groupName" name="group_name" class="form-control custom-input" type="text" value="{{ edit_group.group_name }}" />
            </div>

            <div>
              <label class="form-label-custom" for="groupDescription">Description</label>
              <textarea id="groupDescription" name="group_description" class="form-control custom-textarea" rows="5">{{ edit_group.group_description or '' }}</textarea>
            </div>

            <div class="button-row">
              <a href="GroupA.html" class="action-btn secondary-btn">Cancel</a>
              <button type="submit" class="action-btn primary-btn border-0">Save</button>
            </div>
          </form>
          {% else %}
          <p class="p-3">Open this page from <a href="GroupA.html">Groups</a> with a valid <code>?id=</code> query.</p>
          {% endif %}
        </section>
      </main>
    </div>
  </div>
</body>
</html>
