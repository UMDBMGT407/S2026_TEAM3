<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Static/CSS/vars.css">
  <link rel="stylesheet" href="../../Static/CSS/ChallengeAedstyle.css">
  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }
   </style>
  <title>Document</title>
</head>
<body>
  <div class="challenge-edit-layout container-fluid p-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-md-3 col-xl-2 sidebar-wrap">
        <div class="sidebar-content">
          <img class="motiv-logo" src="../../Static/Images%201/ChallengeAEDmotiv-logo0.png" alt="Motiv logo" />
          <nav class="navigation-bar">
            <a href="ADash.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/ChallengeAEDvector0.svg" alt="" /><span>Dashboard</span></a>
            <a href="GroupA.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/ChallengeAEDvector1.svg" alt="" /><span>Groups</span></a>
            <a href="ChallengeA.html" class="nav-item-link active"><img class="nav-icon" src="../../Static/Images%201/ChallengeAEDvector2.svg" alt="" /><span>Scheduling</span></a>
            <a href="ScheduleA.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/ChallengeAEDvector3.svg" alt="" /><span>Challenges</span></a>
            <a href="PostA.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/ChallengeAEDvector4.svg" alt="" /><span>Posts</span></a>
            <a href="AProfile.html" class="nav-item-link"><img class="nav-icon" src="../../Static/Images%201/ChallengeAEDvector-profile-icon0.svg" alt="" /><span>Profile</span></a>
          </nav>
        </div>
      </aside>

      <main class="col-12 col-md-9 col-xl-10 main-wrap">
        <header class="topbar">
          <h1 class="page-title">Scheduling</h1>
          <img class="profile-picture" src="../../Static/Images%201/ChallengeAEDprofile-picture0.png" alt="Profile picture" />
        </header>

        <section class="edit-card">
          <div class="card-header-line">
            <h2 class="edit-group">Edit Scheduling</h2>
          </div>

          {% if edit_session %}
          <form class="edit-form" method="post" action="/actions/admin/schedule/{{ edit_session.group_workout_id }}/edit">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label-custom" for="sessionName">Session Name</label>
                <input id="sessionName" name="session_name" class="form-control custom-input" type="text" value="{{ edit_session.group_workout_title }}" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label-custom" for="dateField">Date</label>
                <input id="dateField" name="date_field" class="form-control custom-input" type="date" value="{{ edit_session.group_workout_scheduled_date }}" />
              </div>
              <div class="col-12">
                <label class="form-label-custom" for="locationField">Location</label>
                <input id="locationField" name="location_field" class="form-control custom-input" type="text" value="{{ edit_session.group_workout_location or '' }}" />
              </div>
            </div>

            <div class="button-row">
              <a href="ChallengeA.html" class="action-btn secondary-btn">Cancel</a>
              <button type="submit" class="action-btn primary-btn border-0">Save</button>
            </div>
          </form>
          {% else %}
          <p class="p-3">Open from <a href="ChallengeA.html">Scheduling</a> with <code>?id=</code> (group workout id).</p>
          {% endif %}
        </section>
      </main>
    </div>
  </div>
</body>
</html>
